[pytest]
# Run all async test functions automatically (no @pytest.mark.asyncio needed)
asyncio_mode = auto

# Allure results directory
addopts =
    --alluredir=reports/allure-results
    -v

# Custom markers (add more as needed)
markers =
    search: Tests covering book search functionality
    reading_list: Tests covering the Reading List feature
    performance: Tests that measure page-load performance
    data_driven: Tests parameterised from external data files
    smoke: Quick sanity checks (subset of the full suite)
    e2e: End-to-end tests that require a live browser and network
